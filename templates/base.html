<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUPLY | AI Plagiarism Detection ⚡</title>
    <!-- SEO Tags -->
    <meta name="description" content="DUPLY is a high-performance AI-powered plagiarism detection system for professionals.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="page-transition" id="transition-overlay"></div>
    
    <nav>
        <div class="container" style="display: flex; justify-content: space-between; width: 100%;">
            <a href="/" class="logo">DUPLY.AI</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/dashboard">Dashboard</a>
                <a href="#features">Features</a>
                <button id="theme-toggle" class="btn-icon" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem;">
                    <i class="ph ph-moon"></i>
                </button>
                <a href="/auth" class="btn-primary">Get Started</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
