<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PLAGIX | Similarity with Clarity{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container flex justify-between items-center" style="width: 100%;">
            <a href="/" class="logo">PLAGIX</a>
            <nav>
                <a href="/dashboard">Dashboard</a>
                <a href="/auth">Sign In</a>
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <i class="ph-bold ph-sun"></i>
                </button>
                <a href="/dashboard" class="btn btn-primary">Start</a>
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
