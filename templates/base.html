<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PLAGIX | Similarity with Clarity{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="sky-background">
        <div class="stars-container"></div>
        <div class="clouds-container">
            <div class="sky-cloud cloud-1"></div>
            <div class="sky-cloud cloud-2"></div>
            <div class="sky-cloud cloud-3"></div>
        </div>
    </div>
    <header>
        <div class="header-container">
            <a href="/" class="logo">PLAGIX</a>
            
            <div class="nav-center">
                <a href="/dashboard">Dashboard</a>
                <a href="/auth">Sign In</a>
            </div>

            <div class="nav-right">
                <a href="/dashboard" class="btn btn-primary">Start</a>
                <div class="theme-switch" id="theme-switch">
                    <div class="switch-track">
                        <div class="sky">
                            <div class="stars">
                                <div class="star"></div>
                                <div class="star"></div>
                                <div class="star"></div>
                                <div class="star"></div>
                                <div class="star"></div>
                            </div>
                            <div class="clouds">
                                <div class="cloud"></div>
                                <div class="cloud"></div>
                                <div class="cloud"></div>
                                <div class="cloud"></div>
                            </div>
                        </div>
                        <div class="knob">
                            <div class="moon-craters">
                                <div class="crater"></div>
                                <div class="crater"></div>
                                <div class="crater"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
