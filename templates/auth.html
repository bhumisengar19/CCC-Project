{% extends "base.html" %}

{% block content %}
<div style="height: calc(100vh - 72px); display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 32px; display: flex; flex-direction: column;">
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 24px;">
            <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 8px; color: var(--text);">Sign in to PLAGIX</h2>
            <p style="font-size: 14px; color: var(--text-muted);">Enter your credentials to manage reports.</p>
        </div>

        <!-- Form -->
        <form onsubmit="event.preventDefault(); window.location.href='/dashboard';" style="display: flex; flex-direction: column; gap: 18px;">
            <div style="display: flex; flex-direction: column;">
                <label>Email address</label>
                <input type="email" placeholder="name@company.com" required style="width: 100%;">
            </div>
            
            <div style="display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500;">Forgot password?</a>
                </div>
                <input type="password" placeholder="••••••••" required style="width: 100%;">
            </div>

            <button type="submit" class="btn btn-magnetic" style="width: 100%; margin-top: 12px;">Sign In</button>
        </form>

        <!-- Divider -->
        <div style="margin: 24px 0; border-top: 1px solid var(--border);"></div>

        <!-- Footer -->
        <div style="text-align: center; margin-top: 16px;">
            <p style="font-size: 13px; color: var(--text-muted);">
                Don't have an account? <a href="#" style="color: var(--accent); text-decoration: none; font-weight: 600;">Create account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
