{% extends "base.html" %}

{% block content %}
<main class="auth-wrapper">
    <div class="card auth-card animate-in">
        <h2 style="margin-bottom: 0.5rem;">Sign In</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Welcome back to Plagix.</p>
        
        <form>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width: 100%; padding: 0.75rem; margin-top: 1rem;">Continue</button>
        </form>
        
        <p style="margin-top: 2rem; font-size: 0.85rem; text-align: center; color: var(--text-muted);">
            Don't have an account? <a href="#" style="color: var(--accent); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
    </div>
</main>
{% endblock %}
